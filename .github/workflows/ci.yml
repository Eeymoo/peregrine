name: CI

# 每次 push 到 main/master 分支或提交 PR 时触发，
# 验证 Windows + macOS + Linux 三平台编译与测试通过。
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 跨平台编译检查（不打包，只确保能 build）。
  build:
    name: Build & Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux 需要安装 GUI 依赖（wgpu / winit / tray-icon 编译需要）。
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libwayland-dev libxkbcommon-dev libegl-dev libasound2-dev \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.target }}

      # config 库有单元测试，跨平台可运行。
      - name: Run config tests
        run: cargo test -p peregrine_config --locked

      # 全量 release 编译，确保二进制 crate 可跨平台构建。
      - name: Build release binary
        run: cargo build --release --locked -p peregrine --target ${{ matrix.target }}

  # 代码格式与 lint 检查（仅在 Linux 上跑，节省 CI 时间）。
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libwayland-dev libxkbcommon-dev libegl-dev libasound2-dev \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy (config crate)
        run: cargo clippy -p peregrine_config -- -D warnings
