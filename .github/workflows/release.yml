name: Release

# 在推送形如 v* 的标签时触发，构建 Windows 产物并发布。
#   - 纯偶数版本号（如 v0.1.6）→ 正式版（stable 通道），生成 stable.json。
#   - 带预发布后缀（如 v0.1.5-alpha.0）或奇数版本号 → 尝鲜版（prerelease 通道），生成 prerelease.json。
# 正式版发布后 releases/latest 指向它，stable.json 可通过 releases/latest/download/ 访问。
# 尝鲜版只能通过具体 tag 访问 prerelease.json。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: peregrine-tauri

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: i686-pc-windows-msvc
            asset_name: windows-x86
            updater_arch: i686
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x64
            updater_arch: x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: windows-arm64
            updater_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version: $VERSION"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          node -e "const fs=require('fs');const p=require('./package.json');p.version='$VERSION';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          node -e "const fs=require('fs');const p=require('./src-tauri/tauri.conf.json');p.version='$VERSION';fs.writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n')"

      - name: Build Tauri release (NSIS + 签名)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set"
            exit 1
          fi
          npx tauri build --target ${{ matrix.target }} --bundles nsis

      - name: Rename NSIS installer
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_VERSION }}"
          $nsisDir = "target/${{ matrix.target }}/release/bundle/nsis"
          $setup = Get-ChildItem "$nsisDir/*-setup.exe" | Select-Object -First 1
          if ($setup) {
            $dst = "peregrine-v${VERSION}-${{ matrix.asset_name }}-setup.exe"
            Copy-Item $setup.FullName $dst
          } else {
            Write-Host "No NSIS installer found"
            exit 1
          }
          $sig = Get-ChildItem "$nsisDir/*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sig) {
            $sigDst = "peregrine-v${VERSION}-${{ matrix.asset_name }}-setup.exe.sig"
            Copy-Item $sig.FullName $sigDst
          } else {
            Write-Host "::error::No .sig file found — check TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_VERSION }}"
          $srcExe = "target/${{ matrix.target }}/release/peregrine-tauri.exe"
          $dstExe = "peregrine-v${VERSION}.exe"
          Copy-Item $srcExe $dstExe
          $zip = "peregrine-v${VERSION}-${{ matrix.asset_name }}.zip"
          Compress-Archive -Path $dstExe, README.md, LICENSE -DestinationPath $zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            peregrine-v${{ env.RELEASE_VERSION }}-${{ matrix.asset_name }}-setup.exe
            peregrine-v${{ env.RELEASE_VERSION }}-${{ matrix.asset_name }}-setup.exe.sig
            peregrine-v${{ env.RELEASE_VERSION }}-${{ matrix.asset_name }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 判定通道：带 `-`（预发布后缀）或 patch 为奇数 → prerelease；否则 → stable。
      - name: Resolve release channel
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # 提取 patch 位（第三个数字）
          PATCH=$(echo "$VERSION" | grep -oP '^\d+\.\d+\.\K\d+')
          echo "Patch number: $PATCH"
          if [[ "$TAG" == *-* ]]; then
            echo "channel=prerelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ $((PATCH % 2)) -eq 1 ]]; then
            echo "channel=prerelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get release body
        id: body
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -n "$TAG_MSG" ]; then
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            git log -1 --format="%B" "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      # 生成更新清单 JSON。
      # 正式版（stable）：生成 stable.json + latest.json
      # 尝鲜版（prerelease）：生成 prerelease.json + latest.json
      - name: Generate update manifests
        env:
          VERSION: ${{ github.ref_name }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          VERSION_NUM="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          SIG_X86=$(cat "dist/peregrine-v${VERSION_NUM}-windows-x86-setup.exe.sig" 2>/dev/null || echo "")
          SIG_X64=$(cat "dist/peregrine-v${VERSION_NUM}-windows-x64-setup.exe.sig" 2>/dev/null || echo "")
          SIG_ARM64=$(cat "dist/peregrine-v${VERSION_NUM}-windows-arm64-setup.exe.sig" 2>/dev/null || echo "")
          DOWNLOAD_BASE="https://github.com/Eeymoo/peregrine/releases/download/${VERSION}"
          NOTES=$(echo "$TAG_MSG" | head -100 | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo '""')

          generate_json() {
            local OUTPUT_FILE=$1
            cat > "$OUTPUT_FILE" << JSONEOF
          {
            "version": "${VERSION_NUM}",
            "notes": ${NOTES},
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-i686": {
                "signature": "${SIG_X86}",
                "url": "${DOWNLOAD_BASE}/peregrine-v${VERSION_NUM}-windows-x86-setup.exe"
              },
              "windows-x86_64": {
                "signature": "${SIG_X64}",
                "url": "${DOWNLOAD_BASE}/peregrine-v${VERSION_NUM}-windows-x64-setup.exe"
              },
              "windows-aarch64": {
                "signature": "${SIG_ARM64}",
                "url": "${DOWNLOAD_BASE}/peregrine-v${VERSION_NUM}-windows-arm64-setup.exe"
              }
            }
          }
          JSONEOF
          }

          # 始终生成 latest.json（向后兼容）
          generate_json "dist/latest.json"

          if [[ "${CHANNEL}" == "stable" ]]; then
            # 正式版：生成 stable.json（releases/latest/download/stable.json 可达）
            generate_json "dist/stable.json"
            echo "Generated stable.json + latest.json"
          else
            # 尝鲜版：生成 prerelease.json（通过具体 tag 访问）
            generate_json "dist/prerelease.json"
            echo "Generated prerelease.json + latest.json"
          fi

          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: dist/*
          fail_on_unmatched_files: true
          body: ${{ steps.body.outputs.text }}
