name: Release

# 在推送形如 v* 的标签时触发，构建 Windows 产物并发布。
#   - 带预发布后缀的标签（如 v0.0.0-alpha.0）→ 打包为「测试包」，发布为 GitHub Pre-release。
#   - 纯版本号标签（如 v0.0.0）→ 打包为「正式版本」，发布为正式 Release。
# 判定依据为 SemVer 规范：版本号中带 `-` 的即为预发布版本。
on:
  push:
    tags:
      - "v*"

# 创建 Release 与上传产物需要写入仓库内容的权限。
permissions:
  contents: write

env:
  # 新 Tauri 二进制包名。
  BIN_NAME: peregrine-tauri

jobs:
  # 构建 release 产物（Windows 多平台）。
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: i686-pc-windows-msvc
            asset_name: windows-x86
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: windows-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      # 从 git tag 提取版本号，自动同步到 Cargo.toml / package.json / tauri.conf.json，
      # 确保三个版本来源一致，无需手动维护。
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          node -e "const fs=require('fs');const p=require('./package.json');p.version='$VERSION';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          node -e "const fs=require('fs');const p=require('./src-tauri/tauri.conf.json');p.version='$VERSION';fs.writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n')"

      - name: Build Tauri release (no-bundle，仅编译 exe)
        run: npx tauri build --target ${{ matrix.target }} --no-bundle

      # 将编译产物 exe 打包为便携 zip，用户下载解压即可运行，无需安装。
      - name: Create portable zip
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/peregrine-tauri.exe"
          $zip = "peregrine-${{ matrix.asset_name }}.zip"
          Compress-Archive -Path $exe -DestinationPath $zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: peregrine-${{ matrix.asset_name }}.zip
          if-no-files-found: error

  # 汇总产物并创建 GitHub Release。
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 根据标签是否包含 `-` 判定预发布：v0.0.0-alpha.0 → true；v0.0.0 → false。
      - name: Resolve release type
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=测试包 (Pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=正式版本 (Release)" >> "$GITHUB_OUTPUT"
          fi

      # 获取 tag 消息作为 Release body（优先 annotated tag，fallback 到 commit message）。
      - name: Get release body
        id: body
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -n "$TAG_MSG" ]; then
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            git log -1 --format="%B" "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: dist/*
          fail_on_unmatched_files: true
          body: ${{ steps.body.outputs.text }}
