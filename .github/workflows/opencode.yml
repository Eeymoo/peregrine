name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, reopened]

jobs:
  opencode:
    if: |
      github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/big-pickle

  auto-label:
    if: |
      github.event_name == 'issues' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: true
          prompt: |
            根据以下 Issue/PR 的标题和内容，自动添加合适的标签。

            可用标签：bug、enhancement、documentation、duplicate、good first issue、help wanted、invalid、question、wontfix

            规则：
            - bug：报告错误、崩溃、功能不工作
            - enhancement：新功能建议、改进请求
            - documentation：文档相关
            - duplicate：重复的 Issue/PR
            - good first issue：适合新手贡献者
            - help wanted：寻求帮助
            - invalid：无效的 Issue/PR
            - question：询问用法或一般问题
            - wontfix：决定不修复

            请根据内容判断最合适的标签并添加，不要评论。