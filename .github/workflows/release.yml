name: Release

# 在推送形如 v* 的标签时触发，构建 Windows 产物并发布。
#   - 带预发布后缀的标签（如 v0.0.0-alpha.0）→ 打包为「测试包」，发布为 GitHub Pre-release。
#   - 纯版本号标签（如 v0.0.0）→ 打包为「正式版本」，发布为正式 Release。
# 判定依据为 SemVer 规范：版本号中带 `-` 的即为预发布版本。
on:
  push:
    tags:
      - "v*"

# 创建 Release 与上传产物需要写入仓库内容的权限。
permissions:
  contents: write

env:
  # 二进制包名（与 crates/peregrine 中的 [[bin]] name 保持一致）。
  BIN_NAME: peregrine

jobs:
  # 构建 release 产物（Windows 多平台）。
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: i686-pc-windows-msvc
            asset_name: windows-x86
            archive: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x64
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: windows-arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p peregrine --target ${{ matrix.target }}

      # 验证 exe 不再依赖 VC 运行时 DLL（VCRUNTIME140.dll 等）。
      # +crt-static 会把这些静态链入；若此步骤失败，说明静态链接未生效，
      # 分发给用户的 exe 会出现"找不到 VCRUNTIME140.dll"错误。
      - name: Verify no VC runtime DLL dependency
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/$env:BIN_NAME.exe"
          $deps = & dumpbin /dependents $exe 2>$null | Select-String -Pattern '\.dll' -CaseSensitive:$false
          $forbidden = @(
            'VCRUNTIME140.dll', 'VCRUNTIME140_1.dll', 'MSVCP140.dll',
            'CONCRT140.dll', 'VCAMP140.dll', 'VCCORLIB140.dll'
          )
          $found = @()
          foreach ($d in $deps) {
            foreach ($f in $forbidden) {
              if ($d -match $f) { $found += $f }
            }
          }
          if ($found.Count -gt 0) {
            Write-Error "exe 仍依赖 VC 运行时 DLL: $($found -join ', ')"
            exit 1
          }
          Write-Host "✓ 无 VC 运行时 DLL 依赖"

      # Windows 打包为 zip。
      - name: Package (Windows)
        shell: pwsh
        run: |
          $staging = "$env:BIN_NAME-$env:GITHUB_REF_NAME-${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $staging
          if (Test-Path README.md) { Copy-Item README.md $staging }
          if (Test-Path LICENSE)   { Copy-Item LICENSE   $staging }
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"
          "ASSET=${staging}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # 汇总产物并创建 GitHub Release。
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 根据标签是否包含 `-` 判定预发布：v0.0.0-alpha.0 → true；v0.0.0 → false。
      - name: Resolve release type
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=测试包 (Pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=正式版本 (Release)" >> "$GITHUB_OUTPUT"
          fi

      # 获取 tag 消息作为 Release body（优先 annotated tag，fallback 到 commit message）。
      - name: Get release body
        id: body
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -n "$TAG_MSG" ]; then
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "text<<EOF" >> "$GITHUB_OUTPUT"
            git log -1 --format="%B" "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: dist/*
          fail_on_unmatched_files: true
          body: ${{ steps.body.outputs.text }}
